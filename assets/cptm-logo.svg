<svg width="1024" height="280" viewBox="0 0 1024 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logo CPTM">
  <title>Logo CPTM</title>
  <rect width="1024" height="280" fill="none"/>

  <!-- Outer red ribbon -->
  <g transform="translate(30 20)">
    <polygon points="0,120 90,30 170,30 80,120 170,210 90,210" fill="#e4001b"/>
    <polygon points="110,-10 180,-10 320,130 250,130" fill="#f72d3f"/>
    <polygon points="250,130 320,130 180,270 110,270" fill="#f72d3f"/>
  </g>

  <!-- Inner red diamond -->
  <g transform="translate(220 140) rotate(45)">
    <rect x="-62" y="-62" width="124" height="124" fill="#e4001b"/>
    <rect x="-37" y="-37" width="74" height="74" fill="white"/>
  </g>

  <!-- Wordmark -->
  <text x="420" y="194" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="172" letter-spacing="3" fill="#7a7d82">CPTM</text>
</svg>
